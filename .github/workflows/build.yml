name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4 # 升级到最新 v4 避免警告

    # 2. 设置 Node 环境
    - name: Set up Node.js
      uses: actions/setup-node@v4 # 升级到最新 v4 避免警告
      with:
        node-version: 20

    # 3. 自动查找并安装 CocoaPods 依赖
    - name: Install Pods
      run: |
        PODFILE_PATH=$(find . -name "Podfile")
        if [ ! -z "$PODFILE_PATH" ]; then
          POD_DIR=$(dirname "$PODFILE_PATH")
          echo "Found Podfile in $POD_DIR, installing..."
          cd "$POD_DIR" && pod install
        else
          echo "No Podfile found, skipping..."
        fi



    # 4. 核心：在编译前直接强行删除 Watch 手表端相关的代码与依赖，确保绝对不触发其报错
    - name: Clean Watch Code and Build
      run: |
        mkdir -p $GITHUB_WORKSPACE/build-output
        
        echo "=== 正在强行剔除项目中的所有 Watch 手表端配置和文件 ==="
        # 1. 物理删除所有与手表有关的源码文件夹
        rm -rf "apps/ios/Orange Cloud/Orange Cloud Watch"
        rm -rf "apps/ios/Orange Cloud/Orange Cloud Watch Watch App"
        
        # 2. 如果项目是用 CocoaPods 管理的，顺便把 Podfile 里的 watch 依赖也抹掉（防止 pod 阶段报错）
        if [ -f "apps/ios/Podfile" ]; then
          sed -i '' '/target .*Watch/,$d' apps/ios/Podfile || true
        fi
        
        echo "=== 开始针对 iPhone/iPad 及桌面小组件进行绝对纯净编译 ==="
        xcodebuild -project "apps/ios/Orange Cloud/Orange Cloud.xcodeproj" \
                   -scheme "Orange Cloud" \
                   -configuration Release \
                   -sdk iphoneos \
                   clean build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   APPLICATION_EXTENSION_API_ONLY=YES \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   CONFIGURATION_BUILD_DIR=$GITHUB_WORKSPACE/build-output



    # 5. 将生成的 .app 封装成 .ipa 安装包
    - name: Package .app into .ipa
      run: |
        mkdir -p $GITHUB_WORKSPACE/Payload
        APP_PATH=$(find $GITHUB_WORKSPACE/build-output -name "*.app" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: .app file not found!"
          exit 1
        fi
        echo "Found .app at: $APP_PATH"
        cp -r "$APP_PATH" $GITHUB_WORKSPACE/Payload/
        cd $GITHUB_WORKSPACE
        zip -r orange-cloud-unsigned.ipa Payload

    # 6. 上传生成的无签名 ipa 到 Artifacts
    - name: Upload IPA to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: orange-cloud-unsigned-ipa
        path: orange-cloud-unsigned.ipa
